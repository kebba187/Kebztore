{% extends "base.html" %}
{% load i18n %}
{% block content %}
<div class="auth-card">
  <h1>{% trans "Новый пароль" %}</h1>
  {% if validlink %}
    <form method="post" novalidate>{% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn">{% trans "Сохранить" %}</button>
    </form>
  {% else %}
    <p>{% trans "Ссылка недействительна или устарела." %}</p>
  {% endif %}
</div>
{% endblock %}
